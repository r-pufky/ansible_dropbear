---
###############################################################################
# Dropbear Role Options
###############################################################################

dropbear___release: "{{ {} | r_pufky.data.v3(

    _date='2026-03-10',
    _debian='trixie',
  ) }}"

dropbear___app: "{{ {} | r_pufky.data.v3(

    _valid_key_types=['dss','rsa','ecdsa','ed25519'],
    _cfg='/etc/dropbear/initramfs/dropbear.conf',
    _etc_dir='/etc/dropbear/initramfs',
    _authorized_keys_file='/etc/dropbear/initramfs/authorized_keys',
  ) }}"

###############################################################################
# APT Packages
###############################################################################

dropbear___packages:
  - 'dropbear-initramfs'
