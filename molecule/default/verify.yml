---
- name: 'Verify'
  hosts: 'all'
  gather_facts: false
  become: true
  tasks:
    - name: 'Verify | test | /etc/dropbear/initramfs/dropbear.conf'
      ansible.builtin.include_role:
        name: 'r_pufky.data.test'
        tasks_from: 'copy.yml'
      vars:
        test_name: 'Verify | test | /etc/dropbear/initramfs/dropbear.conf'
        test_src: '{{
            lookup("env", "MOLECULE_PROJECT_DIRECTORY") ~
            "/molecule/files/dropbear.conf"
          }}'
        test_file: '/etc/dropbear/initramfs/dropbear.conf'
        test_owner: 'root'
        test_group: 'root'
        test_mode: '0644'
        test_diff: true

    - name: 'Verify | test | /etc/dropbear/initramfs/dropbear_rsa_host_key'
      ansible.builtin.include_role:
        name: 'r_pufky.data.test'
        tasks_from: 'copy.yml'
      vars:
        test_name:
          'Verify | test | /etc/dropbear/initramfs/dropbear_rsa_host_key'
        test_src: '{{
            lookup("env", "MOLECULE_PROJECT_DIRECTORY") ~
            "/molecule/files/dropbear_rsa_host_key"
          }}'
        test_file: '/etc/dropbear/initramfs/dropbear_rsa_host_key'
        test_owner: 'root'
        test_group: 'root'
        test_mode: '0600'
        test_diff: true

    - name: 'Verify | test | /etc/dropbear/initramfs/'
      ansible.builtin.include_role:
        name: 'r_pufky.data.test'
        tasks_from: 'file.yml'
      vars:
        test_name: '{{ "Verify | test | " ~item }}'
        test_file: '{{ item }}'
        test_owner: 'root'
        test_group: 'root'
        test_mode: '0644'
        test_state: 'absent'
        test_diff: true
      loop:
        - '/etc/dropbear/initramfs/dropbear_dss_host_key'
        - '/etc/dropbear/initramfs/dropbear_ecdsa_host_key'
        - '/etc/dropbear/initramfs/dropbear_ed25519_host_key'
